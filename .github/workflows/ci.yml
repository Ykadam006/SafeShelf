name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  api-service:
    name: api-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-service

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: safeshelf_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/safeshelf_test?schema=public
      RECALL_SERVICE_URL: http://127.0.0.1:59999

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/api-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # Build does not require DATABASE_URL; tests use Postgres service above.
      - name: Prepare Prisma schema for tests
        run: npx prisma generate && npx prisma db push --skip-generate

      - name: Run tests (if configured)
        run: npm run test --if-present

  recall-service:
    name: recall-service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/recall-service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: services/recall-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  frontend:
    name: frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    env:
      # Optional at build time; client falls back when unset — set for clarity in CI logs.
      VITE_API_BASE_URL: http://localhost:5000/api

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
