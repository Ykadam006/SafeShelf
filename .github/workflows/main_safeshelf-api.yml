# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - safeshelf-api

on:
  push:
    branches:
      - main
    paths:
      - "services/api-service/**"
      - ".github/workflows/main_safeshelf-api.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: services/api-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm
          cache-dependency-path: services/api-service/package-lock.json

      - name: Install dependencies
        # postinstall runs `prisma generate` (see services/api-service/package.json)
        run: npm ci

      - name: Build TypeScript + copy OpenAPI spec
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: services/api-service
          include-hidden-files: true

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: "Production"
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_0D79EA7A05C14F9F928AAE05F7FED9E0 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_F26D2CF4B71243B5948F2DEA4BBC05AE }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_52FD3E1D9E824555BB955A4FA9036849 }}

      - name: "Deploy to Azure Web App"
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: "safeshelf-api"
          slot-name: "Production"
          package: .
